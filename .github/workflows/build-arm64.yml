name: Build ARM64 Debs

on:
  workflow_dispatch:

env:
  INDI_3RDPARTY_VERSION: 2.1.9
  INDI_CORE_VERSION: 2.1.9

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie
      options: --user root

    steps:
      - name: Install Git
        run: |
          apt-get update
          apt-get install -y git

      - name: Checkout Build Scripts (This Repo)
        uses: actions/checkout@v4
        with:
          path: scripts_repo

      - name: Clone Upstream INDI 3rd Party (v${{ env.INDI_3RDPARTY_VERSION }})
        run: |
          git clone --depth 1 --branch v${{ env.INDI_3RDPARTY_VERSION }} https://github.com/indilib/indi-3rdparty.git indi-source

      - name: Prepare Build Directory
        run: |
          # Copy our build script into the extracted source root
          cp scripts_repo/build_debs.sh indi-source/
          chmod +x indi-source/build_debs.sh

      - name: Setup Sources for Build Dependencies
        run: |
          # Enable deb-src for build-dep
          sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/debian.sources || sed -i '/^deb /p; s/^deb /deb-src /' /etc/apt/sources.list
          apt-get update

      - name: Install Build Dependencies
        run: |
          # Install basic tools
          apt-get install -y build-essential cmake debhelper devscripts fakeroot pkg-config curl gnupg lsb-release dpkg-dev sudo cdbs equivs

          # Install libraries commonly used by 3rd party drivers
          apt-get install -y \
            libcfitsio-dev \
            libnova-dev \
            libusb-1.0-0-dev \
            libcurl4-gnutls-dev \
            libgsl-dev \
            libjpeg-dev \
            libfftw3-dev \
            libczmq-dev \
            libftdi1-dev \
            libgpiod-dev \
            libavcodec-dev \
            libavdevice-dev \
            libavformat-dev \
            libswscale-dev \
            libgps-dev \
            libraw-dev \
            libdc1394-dev \
            libgphoto2-dev \
            libboost-all-dev \
            libopencv-dev \
            libzmq3-dev \
            libudev-dev \
            liblimesuite-dev \
            libhidapi-dev \
            libev-dev \
            libgtest-dev \
            libgmock-dev \
            zlib1g-dev \
            nlohmann-json3-dev

      - name: Ensure pigpio headers are available
        run: |
          set -euo pipefail

          apt-get update
          apt-get install -y python3-setuptools python3-full wget

          for pkg in libpigpiod-if-dev libpigpiod-if2-1 libpigpio-dev pigpio-tools libpigpiod libpigpio1; do
            if apt-get install -y "$pkg"; then
              echo "Installed optional package: $pkg"
            else
              echo "Optional package not available on this image: $pkg"
            fi
          done

          has_if2_header=0
          has_pigpio_header=0

          if [ -f /usr/include/pigpiod_if2.h ] || [ -f /usr/local/include/pigpiod_if2.h ]; then
            has_if2_header=1
          fi

          if [ -f /usr/include/pigpio.h ] || [ -f /usr/local/include/pigpio.h ]; then
            has_pigpio_header=1
          fi

          if [ "$has_if2_header" -eq 1 ] && [ "$has_pigpio_header" -eq 1 ]; then
            echo "pigpio headers already available from packages."
            exit 0
          fi

          cd /tmp
          wget -q https://github.com/joan2937/pigpio/archive/refs/tags/v79.tar.gz
          tar zxf v79.tar.gz
          cd pigpio-79
          make
          make install

          for hdr in pigpio.h pigpiod_if2.h pigpiod_if.h; do
            if [ -f "/usr/local/include/$hdr" ] && [ ! -f "/usr/include/$hdr" ]; then
              cp "/usr/local/include/$hdr" /usr/include/
            fi
          done

          ldconfig

          if [ ! -f /usr/include/pigpiod_if2.h ] && [ ! -f /usr/local/include/pigpiod_if2.h ]; then
            echo "pigpiod_if2.h is still missing after pigpio install" >&2
            exit 1
          fi

          if [ ! -f /usr/include/pigpio.h ] && [ ! -f /usr/local/include/pigpio.h ]; then
            echo "pigpio.h is still missing after pigpio install" >&2
            exit 1
          fi

      - name: Build and install INDI Core (v${{ env.INDI_CORE_VERSION }})
        run: |
          set -euo pipefail
          
          # 1. Build INDI Core from source
          mkdir -p build/indi-core
          git clone --depth 1 --branch v${{ env.INDI_CORE_VERSION }} https://github.com/indilib/indi.git indi-core
          
          cmake -S indi-core -B build/indi-core \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_BUILD_TYPE=Release \
            -DINDI_BUILD_QT5_CLIENT=OFF \
            -DINDI_BUILD_QT_CLIENT=OFF
            
          cmake --build build/indi-core --parallel "$(nproc)"
          cmake --install build/indi-core
          ldconfig

          # 2. Create dummy libindi-dev package to satisfy build deps
          mkdir -p /tmp/libindi-dev-equivs
          cat > /tmp/libindi-dev-equivs/control <<'EOF'
          Section: misc
          Priority: optional
          Standards-Version: 4.7.0
          
          Package: libindi-dev
          Version: ${{ env.INDI_CORE_VERSION }}
          Maintainer: GitHub Actions <actions@github.com>
          Architecture: all
          Description: Dummy libindi-dev package (CI)
           Dummy package to satisfy Build-Depends when INDI is built from source.
          EOF
          
          (cd /tmp/libindi-dev-equivs && equivs-build control)
          dpkg -i /tmp/libindi-dev-equivs/libindi-dev_${{ env.INDI_CORE_VERSION }}_all.deb

      - name: Determine release metadata
        id: release_meta
        run: |
          set -euo pipefail
          release_tag="indi3rdparty-v${{ env.INDI_3RDPARTY_VERSION }}-${GITHUB_RUN_NUMBER}"
          release_name="INDI 3rdparty v${{ env.INDI_3RDPARTY_VERSION }} (Debian Trixie ARM64)"
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "name=$release_name" >> "$GITHUB_OUTPUT"

      - name: Run Build Script
        working-directory: indi-source
        run: ./build_debs.sh

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: indi-3rdparty-arm64-debs
          path: indi-source/dist/*.deb

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          files: indi-source/dist/*.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
