name: Build ARM64 Debs

on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie
      options: --user root

    steps:
      - name: Install Git
        run: |
          apt-get update
          apt-get install -y git

      - name: Checkout Build Scripts (This Repo)
        uses: actions/checkout@v4
        with:
          path: scripts_repo

      - name: Clone Upstream INDI 3rd Party (v2.1.7)
        run: |
          git clone --depth 1 --branch v2.1.7 https://github.com/indilib/indi-3rdparty.git indi-source

      - name: Prepare Build Directory
        run: |
          # Copy our build script into the extracted source root
          cp scripts_repo/build_debs.sh indi-source/
          chmod +x indi-source/build_debs.sh

      - name: Setup Sources for Build Dependencies
        run: |
          # Enable deb-src for build-dep
          sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/debian.sources || sed -i '/^deb /p; s/^deb /deb-src /' /etc/apt/sources.list
          apt-get update

      - name: Install Build Dependencies
        run: |
          # Install basic tools
          apt-get install -y build-essential cmake debhelper devscripts fakeroot pkg-config curl gnupg lsb-release dpkg-dev sudo cdbs equivs

          # Install libraries commonly used by 3rd party drivers
          apt-get install -y \
            libcfitsio-dev \
            libnova-dev \
            libusb-1.0-0-dev \
            libcurl4-gnutls-dev \
            libgsl-dev \
            libjpeg-dev \
            libfftw3-dev \
            libczmq-dev \
            libftdi1-dev \
            libavcodec-dev \
            libavdevice-dev \
            libavformat-dev \
            libswscale-dev \
            libgps-dev \
            libraw-dev \
            libdc1394-dev \
            libgphoto2-dev \
            libboost-all-dev \
            libopencv-dev \
            libzmq3-dev \
            libudev-dev \
            liblimesuite-dev \
            libhidapi-dev \
            libev-dev \
            libgtest-dev \
            libgmock-dev \
            zlib1g-dev \
            nlohmann-json3-dev

      - name: Build and install INDI Core (v2.1.7)
        run: |
          set -euo pipefail
          
          # 1. Build INDI Core from source
          mkdir -p build/indi-core
          git clone --depth 1 --branch v2.1.7 https://github.com/indilib/indi.git indi-core
          
          cmake -S indi-core -B build/indi-core \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_BUILD_TYPE=Release \
            -DINDI_BUILD_QT5_CLIENT=OFF \
            -DINDI_BUILD_QT_CLIENT=OFF
            
          cmake --build build/indi-core --parallel "$(nproc)"
          cmake --install build/indi-core
          ldconfig

          # 2. Create dummy libindi-dev package to satisfy build deps
          mkdir -p /tmp/libindi-dev-equivs
          cat > /tmp/libindi-dev-equivs/control <<'EOF'
          Section: misc
          Priority: optional
          Standards-Version: 4.7.0
          
          Package: libindi-dev
          Version: 2.1.7
          Maintainer: GitHub Actions <actions@github.com>
          Architecture: all
          Description: Dummy libindi-dev package (CI)
           Dummy package to satisfy Build-Depends when INDI is built from source.
          EOF
          
          (cd /tmp/libindi-dev-equivs && equivs-build control)
          dpkg -i /tmp/libindi-dev-equivs/libindi-dev_2.1.7_all.deb

      - name: Run Build Script
        working-directory: indi-source
        run: ./build_debs.sh

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: indi-3rdparty-arm64-debs
          path: indi-source/dist/*.deb

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest-build
          name: Latest Build (Debian Trixie ARM64)
          files: indi-source/dist/*.deb
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
